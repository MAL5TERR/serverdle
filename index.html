<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafiadle — Guess the Member</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
  <header>
    <div class="tag">Daily Challenge</div>
    <h1>MAFIADLE</h1>
    <p>Guess today's mystery member in 6 tries.</p>
  </header>

  <div class="panel">
    <div class="search-wrap">
      <input type="text" id="guessInput" placeholder="Type a name..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>

    <div class="status-row">
      <div class="attempts-dots" id="attemptsDots"></div>
      <div id="attemptsLabel">6 attempts left</div>
    </div>

    <div class="legend">
      <span><span class="swatch green"></span> Exact match</span>
      <span><span class="swatch yellow"></span> Close (±1 year / shared interest or favorite)</span>
      <span><span class="swatch red"></span> No match</span>
    </div>
  </div>

  <div class="panel">
    <div class="headers-row">
      <div>Name</div>
      <div>Join Year</div>
      <div>Interest</div>
      <div>Favorite</div>
      <div>Chat Activity</div>
      <div>Status</div>
    </div>
    <div class="board" id="board"></div>
    <div class="message" id="message"></div>
  </div>

  <footer>Resets daily • Data loaded from members.json</footer>
</div>

<script src="script.js"></script>
</body>
</html>
