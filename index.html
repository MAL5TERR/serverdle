<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafiadle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
  <header>
    <div class="tag">تحدي اليوم</div>
    <h1>MAFIADLE</h1>
    <p>خمّن عضو اليوم الغامض خلال 5 محاولات.</p>
  </header>

  <div class="panel">
    <div class="search-wrap">
      <input type="text" id="guessInput" placeholder="اكتب اسمًا..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>

    <div class="status-row">
      <div class="attempts-dots" id="attemptsDots"></div>
      <div id="attemptsLabel">تبقّى 5 محاولات</div>
    </div>

    <div class="legend">
      <span><span class="swatch green"></span> تطابق تام</span>
      <span><span class="swatch yellow"></span> قريب (±1 سنة / اهتمام أو مفضل مشترك)</span>
      <span><span class="swatch red"></span> غير متطابق</span>
    </div>
  </div>

  <div class="panel">
    <div class="headers-row">
      <div>الاسم</div>
      <div>سنة الانضمام</div>
      <div>الاهتمامات</div>
      <div>Favorite</div>
      <div>نشاط الدردشة</div>
      <div>الحالة</div>
    </div>
    <div class="board" id="board"></div>
    <div class="message" id="message"></div>
  </div>

  <footer>يتجدد يوميًا</footer>
</div>

<script src="script.js"></script>
</body>
</html>
