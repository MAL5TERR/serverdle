<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serverdle — Guess the Member</title>
<style>
  :root{
    --bg: #15161b;
    --panel: #1e2027;
    --panel-2: #24262f;
    --border: #34363f;
    --text: #eceef2;
    --muted: #9a9ca6;
    --accent: #7c5cff;
    --accent-2: #ff7a59;
    --green: #4caf6b;
    --yellow: #d9a441;
    --red: #de5959;
    --radius: 14px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% -10%, rgba(124,92,255,0.15), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(255,122,89,0.08), transparent 35%),
      var(--bg);
    color: var(--text);
    display:flex;
    justify-content:center;
    padding: 32px 16px 64px;
  }

  .game{
    width: 100%;
    max-width: 620px;
  }

  header{
    text-align:center;
    margin-bottom: 24px;
  }

  header .tag{
    display:inline-block;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(124,92,255,0.12);
    border: 1px solid rgba(124,92,255,0.35);
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
  }

  header h1{
    margin: 0 0 6px;
    font-size: 28px;
    letter-spacing: -0.5px;
  }

  header p{
    margin:0;
    color: var(--muted);
    font-size: 14px;
  }

  .panel{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 18px;
  }

  .search-wrap{
    position: relative;
  }

  #guessInput{
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  #guessInput:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,255,0.18);
  }

  #guessInput:disabled{
    opacity: 0.5;
    cursor: not-allowed;
  }

  .dropdown{
    position:absolute;
    top: calc(100% + 6px);
    left:0;
    right:0;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 10;
    max-height: 220px;
    overflow-y: auto;
    display:none;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }

  .dropdown.show{ display:block; }

  .dropdown-item{
    padding: 10px 16px;
    cursor:pointer;
    font-size: 14px;
    transition: background 0.1s ease;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .dropdown-item:hover, .dropdown-item.active{
    background: rgba(124,92,255,0.15);
  }

  .dropdown-item.disabled{
    opacity: 0.35;
    cursor:not-allowed;
  }

  .dropdown-item small{
    color: var(--muted);
    font-size: 11px;
  }

  .status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
  }

  .attempts-dots{
    display:flex;
    gap:6px;
  }

  .dot{
    width: 10px;
    height:10px;
    border-radius:50%;
    background: var(--panel-2);
    border: 1px solid var(--border);
  }

  .dot.used{
    background: var(--accent-2);
    border-color: var(--accent-2);
  }

  .legend{
    display:flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .legend span{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }

  .swatch{
    width: 10px; height:10px; border-radius:3px;
  }

  .swatch.green{ background: var(--green); }
  .swatch.yellow{ background: var(--yellow); }
  .swatch.red{ background: var(--red); }

  .board{
    display:flex;
    flex-direction: column;
    gap: 10px;
  }

  .headers-row, .guess-row{
    display:grid;
    grid-template-columns: 1.3fr 0.9fr 1fr 1fr 0.9fr 0.9fr;
    gap: 6px;
  }

  .headers-row{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    padding: 0 2px;
  }

  .cell{
    padding: 12px 8px;
    border-radius: 8px;
    background: var(--panel-2);
    text-align:center;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    word-break: break-word;
  }

  .guess-row .cell.name-cell{
    font-weight: 700;
    background: var(--panel-2);
    color: var(--text);
  }

  .cell.green{
    background: rgba(76,175,107,0.18);
    border-color: var(--green);
    color: #b8f3cb;
  }

  .cell.yellow{
    background: rgba(217,164,65,0.18);
    border-color: var(--yellow);
    color: #ffe3ab;
  }

  .cell.red{
    background: rgba(222,89,89,0.14);
    border-color: var(--red);
    color: #ffc2c2;
  }

  .guess-row{
    animation: reveal 0.35s ease;
  }

  @keyframes reveal{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .message{
    text-align:center;
    padding: 16px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 16px;
    margin-top: 4px;
    display:none;
  }

  .message.show{ display:block; }

  .message.win{
    background: rgba(76,175,107,0.15);
    border: 1px solid var(--green);
    color: #b8f3cb;
  }

  .message.lose{
    background: rgba(222,89,89,0.15);
    border: 1px solid var(--red);
    color: #ffc2c2;
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 20px;
  }

  @media (max-width: 520px){
    .headers-row{ display:none; }
    .guess-row{
      grid-template-columns: 1fr;
    }
    .cell{
      display:flex;
      justify-content:space-between;
      align-items:center;
      text-align:left;
      padding: 10px 12px;
    }
    .cell::before{
      content: attr(data-label);
      font-size: 10px;
      text-transform:uppercase;
      color: inherit;
      opacity: 0.7;
      font-weight: 600;
      margin-right: 8px;
    }
  }
</style>
</head>
<body>

<div class="game">
  <header>
    <div class="tag">Daily Challenge</div>
    <h1>Serverdle</h1>
    <p>Guess today's mystery server member in 6 tries.</p>
  </header>

  <div class="panel">
    <div class="search-wrap">
      <input type="text" id="guessInput" placeholder="Type a name..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>

    <div class="status-row">
      <div class="attempts-dots" id="attemptsDots"></div>
      <div id="attemptsLabel">6 attempts left</div>
    </div>

    <div class="legend">
      <span><span class="swatch green"></span> Exact match</span>
      <span><span class="swatch yellow"></span> Close (±1 year)</span>
      <span><span class="swatch red"></span> No match</span>
    </div>
  </div>

  <div class="panel">
    <div class="headers-row">
      <div>Name</div>
      <div>Join Year</div>
      <div>Interest</div>
      <div>Favorite</div>
      <div>Status</div>
      <div>Role</div>
    </div>
    <div class="board" id="board"></div>
    <div class="message" id="message"></div>
  </div>

  <footer>Resets daily • Data is local placeholder data</footer>
</div>

<script>
/* ============================================================
   1. DATA — replace/extend this list with your real server members
   ============================================================ */
const people = [
  { name: "Ali",     joinYear: 2021, interest: "Gaming",  favorite: "Valorant",     status: "Active",   role: "Admin"    },
  { name: "Zainab",  joinYear: 2022, interest: "Anime",    favorite: "One Piece",    status: "Active",   role: "Member"   },
  { name: "Karim",   joinYear: 2020, interest: "Gaming",  favorite: "CS2",          status: "Inactive", role: "Member"   },
  { name: "Rand",    joinYear: 2023, interest: "Football", favorite: "Real Madrid",  status: "Active",   role: "Member"   },
  { name: "Yusuf",   joinYear: 2022, interest: "Anime",    favorite: "Attack on Titan", status: "Active", role: "Moderator" },
  { name: "Dana",    joinYear: 2021, interest: "Gaming",  favorite: "League of Legends", status: "Active", role: "Member" },
  { name: "Omar",    joinYear: 2019, interest: "Football", favorite: "Barcelona",   status: "Inactive", role: "Member"   },
  { name: "Lina",    joinYear: 2023, interest: "Anime",    favorite: "Jujutsu Kaisen", status: "Active", role: "Member"   },
  { name: "Hassan",  joinYear: 2020, interest: "Gaming",  favorite: "Minecraft",    status: "Active",   role: "Moderator" },
  { name: "Noor",    joinYear: 2022, interest: "Football", favorite: "Man City",    status: "Active",   role: "Member"   },
  { name: "Tariq",   joinYear: 2024, interest: "Gaming",  favorite: "Overwatch",    status: "Active",   role: "Member"   },
  { name: "Sara",    joinYear: 2021, interest: "Anime",    favorite: "Demon Slayer", status: "Inactive", role: "Member"   },
];

/* ============================================================
   2. DAILY ANSWER LOGIC — deterministic, resets every 24h
   ============================================================ */
const DAY_MS = 86400000;
const dayIndex = Math.floor(Date.now() / DAY_MS);
const answerIndex = dayIndex % people.length;
const answer = people[answerIndex];

const MAX_ATTEMPTS = 6;
const STORAGE_KEY = "serverdle_state_v1";

/* ============================================================
   3. STATE (persisted per-day so a refresh doesn't reset progress)
   ============================================================ */
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(parsed.dayIndex !== dayIndex) return null; // stale day, discard
    return parsed;
  }catch(e){ return null; }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    dayIndex,
    guesses: state.guesses,
    finished: state.finished,
    won: state.won
  }));
}

let state = loadState() || { dayIndex, guesses: [], finished: false, won: false };

/* ============================================================
   4. DOM REFERENCES
   ============================================================ */
const input = document.getElementById('guessInput');
const dropdown = document.getElementById('dropdown');
const board = document.getElementById('board');
const message = document.getElementById('message');
const attemptsDots = document.getElementById('attemptsDots');
const attemptsLabel = document.getElementById('attemptsLabel');

/* ============================================================
   5. COMPARISON LOGIC
   ============================================================ */
function compareGuess(guess){
  const result = {};

  // Join year: exact / ±1 / wrong
  const diff = Math.abs(guess.joinYear - answer.joinYear);
  if(diff === 0) result.joinYear = 'green';
  else if(diff === 1) result.joinYear = 'yellow';
  else result.joinYear = 'red';

  ['interest','favorite','status','role'].forEach(key => {
    result[key] = (guess[key] === answer[key]) ? 'green' : 'red';
  });

  return result;
}

/* ============================================================
   6. RENDERING
   ============================================================ */
function renderDots(){
  attemptsDots.innerHTML = '';
  for(let i=0; i<MAX_ATTEMPTS; i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.guesses.length ? ' used' : '');
    attemptsDots.appendChild(d);
  }
  const left = MAX_ATTEMPTS - state.guesses.length;
  attemptsLabel.textContent = state.finished
    ? (state.won ? 'Solved!' : 'Out of attempts')
    : `${left} attempt${left === 1 ? '' : 's'} left`;
}

function renderRow(guessName){
  const person = people.find(p => p.name === guessName);
  if(!person) return;
  const result = compareGuess(person);

  const row = document.createElement('div');
  row.className = 'guess-row';

  const nameCell = document.createElement('div');
  nameCell.className = 'cell name-cell';
  nameCell.textContent = person.name;
  nameCell.setAttribute('data-label','Name');
  row.appendChild(nameCell);

  const fields = [
    ['joinYear', person.joinYear],
    ['interest', person.interest],
    ['favorite', person.favorite],
    ['status', person.status],
    ['role', person.role]
  ];

  const labels = { joinYear:'Join Year', interest:'Interest', favorite:'Favorite', status:'Status', role:'Role' };

  fields.forEach(([key, value]) => {
    const cell = document.createElement('div');
    cell.className = 'cell ' + result[key];
    cell.textContent = value;
    cell.setAttribute('data-label', labels[key]);
    row.appendChild(cell);
  });

  board.appendChild(row);
}

function renderBoard(){
  board.innerHTML = '';
  state.guesses.forEach(g => renderRow(g));
}

function renderMessage(){
  message.classList.remove('show','win','lose');
  if(!state.finished) return;

  if(state.won){
    message.textContent = `🎉 You win! The answer was ${answer.name}.`;
    message.classList.add('show','win');
  } else {
    message.textContent = `❌ Out of guesses. The answer was ${answer.name}.`;
    message.classList.add('show','lose');
  }
}

function renderLockState(){
  input.disabled = state.finished;
}

function renderAll(){
  renderDots();
  renderBoard();
  renderMessage();
  renderLockState();
}

/* ============================================================
   7. AUTOCOMPLETE
   ============================================================ */
let activeIndex = -1;

function getMatches(query){
  const q = query.trim().toLowerCase();
  if(!q) return [];
  return people.filter(p => p.name.toLowerCase().includes(q));
}

function isAlreadyGuessed(name){
  return state.guesses.includes(name);
}

function renderDropdown(matches){
  dropdown.innerHTML = '';
  activeIndex = -1;

  if(matches.length === 0){
    dropdown.classList.remove('show');
    return;
  }

  matches.forEach(person => {
    const item = document.createElement('div');
    const already = isAlreadyGuessed(person.name);
    item.className = 'dropdown-item' + (already ? ' disabled' : '');
    item.innerHTML = `<span>${person.name}</span>${already ? '<small>already guessed</small>' : ''}`;
    if(!already){
      item.addEventListener('click', () => submitGuess(person.name));
    }
    dropdown.appendChild(item);
  });

  dropdown.classList.add('show');
}

input.addEventListener('input', () => {
  if(state.finished) return;
  const matches = getMatches(input.value);
  renderDropdown(matches);
});

input.addEventListener('focus', () => {
  if(state.finished) return;
  const matches = getMatches(input.value);
  if(matches.length) renderDropdown(matches);
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')){
    dropdown.classList.remove('show');
  }
});

input.addEventListener('keydown', (e) => {
  const items = Array.from(dropdown.querySelectorAll('.dropdown-item:not(.disabled)'));
  if(!dropdown.classList.contains('show') || items.length === 0) return;

  if(e.key === 'ArrowDown'){
    e.preventDefault();
    activeIndex = (activeIndex + 1) % items.length;
    items.forEach(i => i.classList.remove('active'));
    items[activeIndex].classList.add('active');
    items[activeIndex].scrollIntoView({ block: 'nearest' });
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    activeIndex = (activeIndex - 1 + items.length) % items.length;
    items.forEach(i => i.classList.remove('active'));
    items[activeIndex].classList.add('active');
    items[activeIndex].scrollIntoView({ block: 'nearest' });
  } else if(e.key === 'Enter'){
    e.preventDefault();
    if(activeIndex >= 0 && items[activeIndex]){
      items[activeIndex].click();
    } else {
      // Enter with a single exact-name match also works
      const exact = people.find(p => p.name.toLowerCase() === input.value.trim().toLowerCase());
      if(exact && !isAlreadyGuessed(exact.name)) submitGuess(exact.name);
    }
  } else if(e.key === 'Escape'){
    dropdown.classList.remove('show');
  }
});

/* ============================================================
   8. GUESS SUBMISSION
   ============================================================ */
function submitGuess(name){
  if(state.finished) return;
  if(isAlreadyGuessed(name)) return; // prevent duplicates
  const person = people.find(p => p.name === name);
  if(!person) return; // must be a valid list name

  state.guesses.push(name);
  input.value = '';
  dropdown.classList.remove('show');

  if(name === answer.name){
    state.won = true;
    state.finished = true;
  } else if(state.guesses.length >= MAX_ATTEMPTS){
    state.finished = true;
    state.won = false;
  }

  saveState();
  renderAll();

  if(state.finished){
    emitResult();
  }
}

/* ============================================================
   9. DISCORD-BOT-READY HOOK
   Exposes a structured result object whenever the game ends.
   A Discord bot (or any external script) can:
     - listen for the 'serverdle:finished' CustomEvent, or
     - call window.getServerdleResult() at any time, or
     - read the same data from localStorage['serverdle_state_v1']
       plus the daily answer (see getServerdleResult()).
   To wire this to a real bot: have this page POST the result JSON
   to your bot's webhook endpoint (fetch('https://your-bot/api/result', {...}))
   from inside emitResult(), once you have a backend endpoint ready.
   ============================================================ */
function getServerdleResult(){
  return {
    date: new Date(dayIndex * DAY_MS).toISOString().slice(0,10),
    answer: answer.name,
    won: state.won,
    attemptsUsed: state.guesses.length,
    maxAttempts: MAX_ATTEMPTS,
    guesses: state.guesses
  };
}
window.getServerdleResult = getServerdleResult;

function emitResult(){
  const detail = getServerdleResult();
  document.dispatchEvent(new CustomEvent('serverdle:finished', { detail }));

  // Example (disabled by default) for future backend integration:
  // fetch('https://your-discord-bot-endpoint.example.com/api/result', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify(detail)
  // });
}

/* ============================================================
   10. INIT
   ============================================================ */
renderAll();
</script>
</body>
</html>
